name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install PySide6 ultralytics opencv-python numpy pillow

      - name: List files before build
        run: |
          echo "Files in repository:"
          dir
          echo "Checking if model file exists:"
          if (Test-Path "yolo26n-face.pt") { echo "Model file found" } else { echo "Model file NOT found" }

      - name: Build with Nuitka (Windows)
        run: |
          nuitka --standalone --enable-plugin=pyside6 --enable-plugin=opencv --enable-plugin=multiprocessing --enable-console --windows-uac-admin --include-data-file=yolo26n-face.pt=yolo26n-face.pt --include-data-file=icon.ico=icon.ico --windows-icon-from-ico=icon.ico --include-package=cv2 --include-package=numpy --include-package=ultralytics --include-module=PIL --output-dir=dist --output-filename=FaceRollCall.exe --follow-imports --lto=yes --jobs=4 --assume-yes-for-downloads main.py

      - name: List files after build
        run: |
          echo "Checking build output:"
          if (Test-Path "dist/main.dist") { 
            echo "Build successful! Files in dist/main.dist:"
            dir dist/main.dist
          } else {
            echo "Build failed - dist/main.dist not found"
            echo "Checking dist directory:"
            if (Test-Path "dist") { dir dist } else { echo "dist directory not found" }
          }

      - name: Upload Windows artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FaceRollCall-Windows
          path: dist/main.dist/
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install PySide6 ultralytics opencv-python numpy pillow

      - name: List files before build
        run: |
          echo "Files in repository:"
          ls -la
          echo "Checking if model file exists:"
          if [ -f "yolo26n-face.pt" ]; then echo "Model file found"; else echo "Model file NOT found"; fi

      - name: Build with Nuitka (Linux)
        run: |
          nuitka --standalone --enable-plugin=pyside6 --enable-plugin=opencv --enable-plugin=multiprocessing --enable-console --windows-uac-admin --include-data-file=yolo26n-face.pt=yolo26n-face.pt --include-data-file=icon.ico=icon.ico --windows-icon-from-ico=icon.ico --include-package=cv2 --include-package=numpy --include-package=ultralytics --include-module=PIL --output-dir=dist --output-filename=FaceRollCall.exe --follow-imports --lto=yes --jobs=4 --assume-yes-for-downloads main.py

      - name: List files after build
        run: |
          echo "Checking build output:"
          if [ -d "dist/main.dist" ]; then 
            echo "Build successful! Files in dist/main.dist:"
            ls -la dist/main.dist
          else
            echo "Build failed - dist/main.dist not found"
            echo "Checking dist directory:"
            if [ -d "dist" ]; then ls -la dist; else echo "dist directory not found"; fi
          fi

      - name: Upload Linux artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: FaceRollCall-Linux
          path: dist/main.dist/
          if-no-files-found: error
