name: Build Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 允许手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'   # 根据项目需求选择版本

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install PySide6 ultralytics opencv-python numpy pillow

      - name: Build with Nuitka (Windows)
        run: |
          nuitka --standalone `
                 --enable-plugin=pyside6 `
                 --windows-disable-console `
                 --windows-uac-admin `
                 --include-data-files=yolo26n-face.pt=./ `
                 --include-package=cv2 `
                 --include-package=numpy `
                 --include-package=ultralytics `
                 --include-module=PIL `
                 --output-dir=dist `
                 --output-filename=FaceRollCall.exe `
                 --follow-imports `
                 --lto=yes `
                 --jobs=4 `
                 main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceRollCall-Windows
          path: dist/main.dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka
          pip install PySide6 ultralytics opencv-python numpy pillow

      - name: Build with Nuitka (Linux)
        run: |
          nuitka --standalone \
                 --enable-plugin=pyside6 \
                 --linux-onefile-icon=icon.ico \   # 可选，设置图标
                 --include-data-files=yolo26n-face.pt=./ \
                 --include-package=cv2 \
                 --include-package=numpy \
                 --include-package=ultralytics \
                 --include-module=PIL \
                 --output-dir=dist \
                 --output-filename=FaceRollCall \
                 --follow-imports \
                 --lto=yes \
                 --jobs=4 \
                 main.py

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: FaceRollCall-Linux
          path: dist/main.dist/
