<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Sniffer Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>MEDIA SNIFFER <span class="pro-badge">PRO</span></h1>
            <p>BATCH DOWNLOAD & NETWORK TRAFFIC ANALYSIS</p>
        </header>

        <div class="input-group">
            <input type="url" id="urlInput" placeholder="PASTE WEBSITE URL (HTTPS://...)" />
            <button id="analyzeBtn" onclick="analyzeUrl()">ANALYZE</button>
        </div>

        <!-- 扫描进度面板 -->
        <div id="scanProgress" class="progress-panel hidden">
            <div class="progress-header">
                <span class="progress-title">⊞ SCANNING NETWORK TRAFFIC</span>
                <span id="scanStatus" class="status-badge status-starting">STARTING</span>
            </div>
            <div class="progress-details">
                <div class="detail-item">
                    <span class="label">REQUESTS SCANNED</span>
                    <span id="scannedCount" class="value">0</span>
                </div>
                <div class="detail-item">
                    <span class="label">MEDIA FOUND</span>
                    <span id="foundCount" class="value highlight">0</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="progress-bar">
                    <div id="scanProgressBar" class="progress-fill"></div>
                </div>
            </div>
            <div id="currentUrl" class="current-url">INITIALIZING...</div>
        </div>

        <!-- 结果区域 -->
        <div id="loading" class="hidden">
            <div class="spinner"></div>
            <p>STARTING SCAN...</p>
        </div>

        <div id="resultHeader" class="result-header hidden">
            <h3>FOUND RESOURCES (<span id="totalCount">0</span>)</h3>
            <div class="actions">
                <button class="btn-secondary" onclick="selectAll()">ALL</button>
                <button class="btn-secondary" onclick="selectByType('video')">VIDEO</button>
                <button class="btn-secondary" onclick="selectByType('audio')">AUDIO</button>
                <button class="btn-secondary" onclick="selectByType('image')">PHOTO ONLY</button>
                <button class="btn-secondary" onclick="selectByType('stream')">STREAM</button>
                <button class="btn-primary" onclick="downloadSelected()">
                    DOWNLOAD (<span id="selectedCount">0</span>)
                </button>
            </div>
        </div>

        <div id="results" class="results-grid hidden">
            <!-- Results injected here -->
        </div>

        <div class="divider"></div>

        <!-- 下载队列区域 -->
        <div id="queueSection">
            <h3>DOWNLOAD QUEUE</h3>
            <div id="taskList" class="task-list">
                <p class="empty-msg">NO ACTIVE DOWNLOADS</p>
            </div>
        </div>
    </div>

    <script>
        let currentMedia = [];
        let selectedItems = new Set();
        let pollInterval = null;
        let scanEventSource = null;
        
        let lastScanData = {
            scanned_count: 0,
            found_count: 0,
            status: '',
            current_url: ''
        };

        function generateItemId(url) {
            let hash = 0;
            for (let i = 0; i < url.length; i++) {
                const char = url.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36);
        }

        function findItemById(itemId) {
            return currentMedia.find(item => generateItemId(item.url) === itemId);
        }

        async function analyzeUrl() {
            const url = document.getElementById('urlInput').value;
            const btn = document.getElementById('analyzeBtn');
            const loading = document.getElementById('loading');
            const results = document.getElementById('results');
            const resultHeader = document.getElementById('resultHeader');
            const scanProgress = document.getElementById('scanProgress');

            if (!url) return alert("PLEASE ENTER A URL");

            lastScanData = { scanned_count: 0, found_count: 0, status: '', current_url: '' };

            btn.disabled = true;
            loading.classList.remove('hidden');
            results.classList.add('hidden');
            resultHeader.classList.add('hidden');
            scanProgress.classList.remove('hidden');
            currentMedia = [];
            selectedItems.clear();
            updateCount();

            startScanProgressListener();

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                const data = await response.json();

                if (data.success) {
                    currentMedia = data.data;
                    renderResults(currentMedia);
                    updateTotalCount();
                    
                    if(currentMedia.length > 0) {
                        resultHeader.classList.remove('hidden');
                        results.classList.remove('hidden');
                        startPolling();
                    } else {
                        alert("NO MEDIA FOUND.");
                    }
                } else {
                    alert("ERROR: " + data.error);
                }
            } catch (e) {
                alert("NETWORK ERROR: " + e.message);
            } finally {
                btn.disabled = false;
                loading.classList.add('hidden');
                stopScanProgressListener();
            }
        }

        function startScanProgressListener() {
            if (scanEventSource) {
                scanEventSource.close();
            }
            
            scanEventSource = new EventSource('/scan-progress');
            
            scanEventSource.onmessage = function(event) {
                const data = JSON.parse(event.data);
                updateScanProgress(data);
            };

            scanEventSource.onerror = function() {};
        }

        function stopScanProgressListener() {
            if (scanEventSource) {
                scanEventSource.close();
                scanEventSource = null;
            }
        }

        function updateScanProgress(data) {
            // 安全获取元素
            const statusEl = document.getElementById('scanStatus');
            const scannedEl = document.getElementById('scannedCount');
            const foundEl = document.getElementById('foundCount');
            const urlEl = document.getElementById('currentUrl');
            const progressBar = document.getElementById('scanProgressBar');

            if (data.status && data.status !== lastScanData.status) {
                if (statusEl) {
                    statusEl.innerText = data.status.toUpperCase();
                    statusEl.className = 'status-badge status-' + data.status;
                }
                lastScanData.status = data.status;
                
                if (progressBar) {
                    if (data.status === 'starting') {
                        progressBar.style.width = '10%';
                        progressBar.classList.remove('animating');
                    } else if (data.status === 'scanning') {
                        progressBar.style.width = '60%';
                        progressBar.classList.add('animating');
                    } else if (data.status === 'waiting') {
                        progressBar.style.width = '80%';
                        progressBar.classList.remove('animating');
                    } else if (data.status === 'completed') {
                        progressBar.style.width = '100%';
                        progressBar.classList.remove('animating');
                        progressBar.style.backgroundColor = '#00b894';
                    } else if (data.status === 'error') {
                        progressBar.style.width = '100%';
                        progressBar.classList.remove('animating');
                        progressBar.style.backgroundColor = '#d63031';
                    }
                }
            }
            
            if (data.scanned_count !== undefined && data.scanned_count !== lastScanData.scanned_count) {
                if (scannedEl) scannedEl.innerText = data.scanned_count;
                lastScanData.scanned_count = data.scanned_count;
            }
            
            if (data.found_count !== undefined && data.found_count !== lastScanData.found_count) {
                if (foundEl) {
                    foundEl.innerText = data.found_count;
                    foundEl.classList.add('pulse');
                    setTimeout(() => foundEl.classList.remove('pulse'), 300);
                }
                lastScanData.found_count = data.found_count;
            }
            
            if (data.current_url && data.current_url !== lastScanData.current_url) {
                if (urlEl) urlEl.innerText = data.current_url;
                lastScanData.current_url = data.current_url;
            }
        }

        function renderResults(items) {
            const container = document.getElementById('results');
            if (!container) return;
            
            container.innerHTML = '';

            items.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'media-card';
                const itemId = generateItemId(item.url);
                
                let typeClass = item.type === 'video' ? 'type-video' : 
                                item.type === 'audio' ? 'type-audio' : 
                                item.type === 'stream' ? 'type-stream' : 'type-image';

                card.innerHTML = `
                    <div class="card-header">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="chk_${itemId}" data-item-id="${itemId}" onchange="toggleSelect('${itemId}')">
                        </div>
                        <span class="badge ${typeClass}">${item.type.toUpperCase()}</span>
                        <span class="size">${(item.size / 1024 / 1024).toFixed(2)} MB</span>
                    </div>
                    <div class="card-url" title="${item.url}">${item.url}</div>
                `;
                container.appendChild(card);
            });
        }

        function toggleSelect(itemId) {
            const checkbox = document.getElementById(`chk_${itemId}`);
            const item = findItemById(itemId);
            
            if (!item) {
                console.error('Item not found for ID:', itemId);
                return;
            }
            
            if (checkbox.checked) {
                selectedItems.add(item);
            } else {
                selectedItems.delete(item);
            }
            updateCount();
        }

        function selectAll() {
            const checkboxes = document.querySelectorAll('#results input[type="checkbox"]');
            const allChecked = Array.from(checkboxes).every(c => c.checked);
            
            checkboxes.forEach(cb => {
                cb.checked = !allChecked;
                const itemId = cb.getAttribute('data-item-id');
                const item = findItemById(itemId);
                if (item) {
                    if (cb.checked) {
                        selectedItems.add(item);
                    } else {
                        selectedItems.delete(item);
                    }
                }
            });
            updateCount();
        }

        function selectByType(type) {
            const checkboxes = document.querySelectorAll('#results input[type="checkbox"]');
            
            checkboxes.forEach(cb => {
                const itemId = cb.getAttribute('data-item-id');
                const item = findItemById(itemId);
                if (item && item.type === type) {
                    cb.checked = true;
                    selectedItems.add(item);
                }
            });
            updateCount();
        }

        function updateCount() {
            const countEl = document.getElementById('selectedCount');
            if (countEl) {
                countEl.innerText = selectedItems.size;
            }
        }

        function updateTotalCount() {
            const totalEl = document.getElementById('totalCount');
            if (totalEl) {
                totalEl.innerText = currentMedia.length;
            }
        }

        async function downloadSelected() {
            if (selectedItems.size === 0) {
                alert("PLEASE SELECT AT LEAST ONE ITEM");
                return;
            }
            
            const itemsArray = Array.from(selectedItems);
            console.log('Downloading items:', itemsArray.length);
            
            const btn = document.querySelector('.btn-primary');
            if (!btn) return;
            
            const originalText = btn.innerText;
            btn.innerText = "STARTING...";
            btn.disabled = true;

            try {
                const res = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ items: itemsArray })
                });
                const data = await res.json();
                console.log('Download response:', data);
                
                if(data.success) {
                    selectedItems.clear();
                    updateCount();
                    document.querySelectorAll('#results input[type="checkbox"]').forEach(c => c.checked = false);
                    startPolling();
                    alert(`STARTED ${data.count || itemsArray.length} DOWNLOAD(S)!`);
                } else {
                    alert("FAILED TO START DOWNLOAD: " + (data.error || JSON.stringify(data.received)));
                }
            } catch (e) {
                alert("ERROR: " + e.message);
            } finally {
                if (btn) {
                    btn.innerText = originalText;
                    btn.disabled = false;
                }
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            updateTaskList();
            pollInterval = setInterval(updateTaskList, 2000);
        }

        async function updateTaskList() {
            try {
                const res = await fetch('/tasks');
                const data = await res.json();
                renderTaskList(data.tasks);
            } catch (e) { console.error(e); }
        }

        function renderTaskList(tasks) {
            const container = document.getElementById('taskList');
            if (!container) return;
            
            if (tasks.length === 0) {
                container.innerHTML = '<p class="empty-msg">NO ACTIVE DOWNLOADS</p>';
                return;
            }

            const sortedTasks = [...tasks].reverse();

            container.innerHTML = sortedTasks.map(task => {
                let statusColor = task.status === 'completed' ? '#00b894' : 
                                  task.status === 'failed' ? '#d63031' : '#0984e3';
                
                let progressHtml = '';
                if (task.status === 'downloading' && task.progress > 0) {
                    progressHtml = `<div class="progress-bar"><div class="progress-fill" style="width:${task.progress}%"></div></div>`;
                } else if (task.status === 'completed') {
                    progressHtml = `<div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>`;
                }

                return `
                    <div class="task-item">
                        <div class="task-info">
                            <span class="task-name">${task.filename || 'Unknown'}</span>
                            <span class="task-status" style="color:${statusColor}">${task.status.toUpperCase()}</span>
                        </div>
                        ${progressHtml}
                    </div>
                `;
            }).join('');
        }

        window.addEventListener('beforeunload', () => {
            stopScanProgressListener();
        });
    </script>
</body>
</html>
